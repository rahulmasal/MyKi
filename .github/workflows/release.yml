name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 1. Build Desktop (Tauri) for Windows, macOS, and Linux
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install tauri-cli
        run: cargo install tauri-cli

      - name: build tauri
        run: cargo tauri build
        working-directory: myki_extension/src-tauri

      - name: upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            myki_extension/src-tauri/target/release/bundle/msi/*.msi
            myki_extension/src-tauri/target/release/bundle/nsis/*.exe
            myki_extension/src-tauri/target/release/bundle/dmg/*.dmg
            myki_extension/src-tauri/target/release/bundle/deb/*.deb
            myki_extension/src-tauri/target/release/bundle/appimage/*.AppImage

  # 2. Build Mobile (Flutter) for Android and iOS
  build-mobile:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest]
        include:
          - platform: ubuntu-latest
            target: apk
          - platform: macos-latest
            target: ios
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup java
        if: matrix.target == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: install dependencies
        run: flutter pub get
        working-directory: myki_app

      - name: build android apk
        if: matrix.target == 'apk'
        run: flutter build apk --release
        working-directory: myki_app

      - name: build ios
        if: matrix.target == 'ios'
        run: flutter build ios --release --no-codesign
        working-directory: myki_app

      - name: upload mobile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-${{ matrix.target }}
          path: |
            myki_app/build/app/outputs/flutter-apk/*.apk
            myki_app/build/ios/iphoneos/*.app

  # 3. Create GitHub Release and upload all artifacts
  release:
    needs: [build-desktop, build-mobile]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4

      - name: create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.msi
            **/*.exe
            **/*.dmg
            **/*.deb
            **/*.AppImage
            **/*.apk
            **/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
