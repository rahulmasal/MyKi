name: Multi-Platform Release

# The 'on' block tells GitHub exactly WHEN this robot should run.
on:
  push:
    # This says: "Only run when someone pushes a 'Tag' that starts with the letter 'v'"
    # For example: pushing 'v1.0.0' or 'v0.2.3' will trigger this build.
    tags:
      - "v*"
  # 'workflow_dispatch' means we can also click a manual button on GitHub to run this anytime we want!
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # JOB 1: Build the Desktop App (Windows, Mac, Linux)
  # ---------------------------------------------------------
  build-desktop:
    name: build-desktop (${{ matrix.platform }})
    permissions:
      contents: write

    # A 'matrix' tells GitHub to run this exact same job multiple times on different computers.
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install tauri-cli
        run: cargo install tauri-cli --locked

      - name: create frontend dist if missing
        run: |
          mkdir -p myki_extension/dist
          cat > myki_extension/dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Myki</title>
          </head>
          <body>
            <div id="app">Loading...</div>
          </body>
          </html>
          EOF

      - name: build tauri
        run: cargo tauri build
        working-directory: myki_extension/src-tauri

      - name: upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: target/release/bundle/**/*

  # 2. Build Mobile (Flutter) for Android and iOS
  build-mobile:
    name: build-mobile (${{ matrix.target }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest]
        include:
          - platform: ubuntu-latest
            target: apk
          - platform: macos-latest
            target: ios
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup java
        if: matrix.target == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: install dependencies
        run: flutter pub get
        working-directory: myki_app

      - name: build android apk
        if: matrix.target == 'apk'
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/myki-android.apk
        working-directory: myki_app

      - name: upload android artifact
        if: matrix.target == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: myki_app/build/app/outputs/flutter-apk/myki-android.apk

      - name: build ios
        if: matrix.target == 'ios'
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          zip -r myki-ios.zip Runner.app
        working-directory: myki_app

      - name: upload ios artifact
        if: matrix.target == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios
          path: myki_app/build/ios/iphoneos/myki-ios.zip

  # 3. Build Browser Extension (Chrome/Firefox)
  build-extension:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: verify web-extension files
        run: |
          echo "Checking web-extension files..."
          ls -la myki_extension/web-extension/
          if [ ! -f "myki_extension/web-extension/manifest.json" ]; then
            echo "ERROR: manifest.json not found!"
            exit 1
          fi
          if [ ! -f "myki_extension/web-extension/popup.html" ]; then
            echo "ERROR: popup.html not found!"
            exit 1
          fi

      - name: package extension
        run: |
          cd myki_extension/web-extension
          zip -r ../myki-chrome.zip . -x "*.git*"
          cp manifest.json manifest.firefox.json
          sed -i 's/"manifest_version": 3/"manifest_version": 2/' manifest.firefox.json
          sed -i 's/_chrome\./_firefox./g' manifest.firefox.json
          zip -r ../myki-firefox.zip . -x "*.git*" -x "manifest.json" "popup.js"
          rm manifest.firefox.json

      - name: verify extension packages
        run: |
          echo "Checking extension packages..."
          ls -la myki_extension/myki-chrome.zip
          ls -la myki_extension/myki-firefox.zip

      - name: upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension
          path: |
            myki_extension/myki-chrome.zip
            myki_extension/myki-firefox.zip

  # 4. Create GitHub Release and upload all artifacts
  release:
    needs: [build-desktop, build-mobile, build-extension]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4

      - name: create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop-windows-latest/**/*.exe
            desktop-windows-latest/**/*.msi
            desktop-macos-latest/**/*.dmg
            desktop-macos-latest/**/*.zip
            desktop-ubuntu-22.04/**/*.deb
            desktop-ubuntu-22.04/**/*.rpm
            desktop-ubuntu-22.04/**/*.tar.gz
            mobile-android/myki-android.apk
            mobile-ios/myki-ios.zip
            browser-extension/myki-chrome.zip
            browser-extension/myki-firefox.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
