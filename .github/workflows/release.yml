name: Multi-Platform Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # 1. Build Desktop (Tauri) for Windows, macOS, and Linux
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install tauri-cli
        run: cargo install tauri-cli

      - name: build tauri
        run: cargo tauri build
        working-directory: myki_extension/src-tauri

      - name: upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            myki_extension/src-tauri/target/release/bundle/msi/*.msi
            myki_extension/src-tauri/target/release/bundle/nsis/*.exe
            myki_extension/src-tauri/target/release/bundle/dmg/*.dmg
            myki_extension/src-tauri/target/release/bundle/deb/*.deb
            myki_extension/src-tauri/target/release/bundle/appimage/*.AppImage

  # 2. Build Mobile (Flutter) for Android and iOS
  build-mobile:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest]
        include:
          - platform: ubuntu-latest
            target: apk
          - platform: macos-latest
            target: ios
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup java
        if: matrix.target == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: install dependencies
        run: flutter pub get
        working-directory: myki_app

      - name: build android apk
        if: matrix.target == 'apk'
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/myki-android.apk
        working-directory: myki_app

      - name: build ios
        if: matrix.target == 'ios'
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          zip -r myki-ios.zip Runner.app
        working-directory: myki_app

      - name: upload mobile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-${{ matrix.target }}
          path: |
            myki_app/build/app/outputs/flutter-apk/myki-android.apk
            myki_app/build/ios/iphoneos/myki-ios.zip

  # 3. Build Browser Extension (Chrome/Firefox)
  build-extension:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: package extension
        run: |
          cd myki_extension/web-extension
          # Create zip archives for Chrome and Firefox
          zip -r myki-chrome.zip . -x "*.git*"
          cp manifest.json manifest.firefox.json
          sed -i 's/"manifest_version": 3/"manifest_version": 2/' manifest.firefox.json
          sed -i 's/_chrome\./_firefox./g' manifest.firefox.json
          zip -r myki-firefox.zip . -x "*.git*" -x "manifest.json" -x "manifest.firefox.json"
          mv myki-firefox.zip manifest.firefox.json myki-firefox-temp.zip 2>/dev/null || true
          cd ..
          cd web-extension
          cp manifest.json manifest.firefox.json
          sed -i 's/"manifest_version": 3/"manifest_version": 2/' manifest.firefox.json
          sed -i 's/_chrome\./_firefox./g' manifest.firefox.json
          zip -r ../myki-firefox.zip . -x "*.git*" -x "manifest.json" -x "manifest.firefox.json"
          rm manifest.firefox.json

      - name: upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension
          path: |
            myki_extension/myki-chrome.zip
            myki_extension/myki-firefox.zip

  # 4. Create GitHub Release and upload all artifacts
  release:
    needs: [build-desktop, build-mobile, build-extension]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4

      - name: create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.msi
            **/*.exe
            **/*.dmg
            **/*.deb
            **/*.AppImage
            **/*.apk
            **/*myki-ios.zip
            **/*chrome*.zip
            **/*firefox*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
