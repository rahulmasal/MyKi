name: myki_app
description: "A secure, local-first password manager inspired by Myki"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # Local storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4

  # Security
  local_auth: ^2.3.0
  cryptography: ^2.7.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  animations: ^2.0.11

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  ffi: ^2.1.2
  path: ^1.9.0

  # QR Code scanning
  mobile_scanner: ^5.2.3

  # Networking (for P2P sync)
  dart_webrtc: ^1.8.1
  web_socket_channel: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
