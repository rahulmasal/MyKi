<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Myki Popup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Myki</h1>
      <span id="native-status" class="status-dot">Checking...</span>
    </header>
    
    <div id="unlock-view" class="view">
      <p class="subtitle">Enter your master password to access the desktop vault.</p>
      <input type="password" id="master-password" placeholder="Master Password">
      <button id="unlock-btn">Unlock Vault</button>
    </div>

    <div id="vault-view" class="view hidden">
      <div class="search-box">
        <input type="text" id="search" placeholder="Search accounts...">
      </div>
      <ul id="credential-list">
        <li class="credential-item empty">No credentials found</li>
      </ul>
      <button id="lock-btn" class="btn-secondary">Lock Vault</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
