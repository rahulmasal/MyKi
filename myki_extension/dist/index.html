<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myki Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <img src="../icons/myki-logo.png" alt="Myki" width="48">
            <h1>Myki Desktop Vault</h1>
        </header>
        <main id="auth-view">
            <h2>Unlock Vault</h2>
            <input type="password" id="master-password" placeholder="Master Password">
            <button id="unlock-btn">Unlock</button>
            <p id="error-msg" style="color: red; display: none;">Invalid password</p>
        </main>
        <main id="vault-view" style="display: none;">
            <div class="toolbar">
                <input type="text" id="search" placeholder="Search...">
                <button id="add-btn">+ Add</button>
            </div>
            <ul id="credential-list"></ul>
        </main>
    </div>
    <script>
        const { invoke } = window.__TAURI__.tauri;
        
        document.getElementById('unlock-btn').addEventListener('click', async () => {
            const pwd = document.getElementById('master-password').value;
            try {
                // Assuming 'unlock_vault' command exists or we mock it
                // await invoke('unlock_vault', { password: pwd });
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('vault-view').style.display = 'block';
                loadCredentials();
            } catch (e) {
                document.getElementById('error-msg').style.display = 'block';
            }
        });

        function loadCredentials() {
            const list = document.getElementById('credential-list');
            list.innerHTML = '<li>No credentials yet (Desktop prototype)</li>';
        }
    </script>
</body>
</html>
